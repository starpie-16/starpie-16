name: Update Readme Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Tạo ảnh Stats bằng Action chính thức mới nhất
      - name: Generate GitHub Readme Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_dir: ./generated-stats
          show_icons: true 
          theme: radical

      # 2. Thay thế bằng Action tạo đồ thị hoạt động tương thích 100%
      - name: Generate GitHub Activity Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # 3. Gom và đẩy toàn bộ file ảnh tĩnh đã tạo vào thư mục lưu trữ
      - name: Deploy Images to Repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./generated-stats
          target-folder: generated-stats
          branch: main
