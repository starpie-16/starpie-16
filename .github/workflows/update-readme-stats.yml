name: Update Readme Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Tạo ảnh Stats bằng Action chính thức mới nhất
      - name: Generate GitHub Readme Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_dir: ./generated-stats
          show_icons: true 
          theme: radical

      # 2. Sửa lỗi: Gọi từ nhánh @main để tránh lỗi tìm version
      - name: Generate GitHub Activity Graph
        uses: ashutosh00710/github-readme-activity-graph@main

      # 3. Đẩy file ảnh đã tạo vào repo bằng công cụ chuẩn của GitHub
      - name: Deploy Images to Repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./generated-stats
          target-folder: generated-stats
          branch: main
